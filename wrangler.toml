name = "ip-compass-api"
main = "worker/index.js"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]

# 自定义域名（部署后在 Cloudflare 控制台绑定）
# routes = [{ pattern = "api.yourdomain.com", custom_domain = true }]

[[kv_namespaces]]
binding = "IP_COMPASS_KV"
id = "8556f4a661d54a9897b0b413649e8996"
preview_id = "1b9479e0a27f42048e03d1d2ff8fda30"

[vars]
# 前端域名，用于 CORS（生产环境建议改为实际域名）
ALLOWED_ORIGIN = "*"

# 敏感变量通过 wrangler secret 设置，不要写在这里：
# wrangler secret put DEEPSEEK_API_KEY
